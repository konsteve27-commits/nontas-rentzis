    <style>
        /* Ειδικά styles για τη μίνιμαλ σελίδα επικοινωνίας */
        .minimal-contact-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
        }

        .minimal-item {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 350px;
            padding: 16px 24px;
            background: #fff;
            border: 1px solid #eaeaea;
            border-radius: 50px; /* Μίνιμαλ στρογγυλεμένο σχήμα */
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        /* Reset για το button του email */
        button.minimal-item {
            font-family: inherit;
            outline: none;
        }

        .minimal-item:hover {
            border-color: #bf9000;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        .minimal-item svg {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            fill: none;
            stroke: #bf9000;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .minimal-item .text {
            flex-grow: 1;
            text-align: left;
            letter-spacing: 0.5px;
        }

        .copy-feedback {
            font-size: 1.2rem; /* Ελαφρώς μεγαλύτερο τικ */
            color: #28a745; /* Πράσινο για επιτυχία */
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            position: absolute;
            right: 24px;
        }

        .copy-feedback.show {
            opacity: 1;
        }
    </style>
</head>

<script>
    function copyEmail(event) {
        event.preventDefault();
        const emailText = "ep.rentzis@gmail.com";
        const feedback = document.getElementById('copy-feedback');
        
        navigator.clipboard.writeText(emailText).then(() => {
            feedback.classList.add('show');
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000); // Το τικ παραμένει για 2 δευτερόλεπτα
        }).catch(err => {
            console.error('Αποτυχία αντιγραφής: ', err);
        });
    }
</script>
